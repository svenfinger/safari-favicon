<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safari Favicon Tester</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Safari Favicon Tester</h1>
    <p class="lead">Pick a PNG from your computer. Nothing is uploaded — everything runs in your browser.</p>
    <p class="note"><strong>Note:</strong> Safari’s favicon background rules are undocumented. This is an approximation. Validate in Safari when it matters.</p>

    <p class="upload">
      <label class="upload__label">
        <span class="upload__text">PNG favicon</span>
        <input type="file" id="file" class="upload__input" accept="image/png">
      </label>
    </p>

    <div id="output" hidden>
      <p id="summary" class="summary" aria-live="polite"></p>
      <h2>Checklist</h2>
      <ul id="checklist"></ul>

      <div class="previews">
        <section class="preview">
          <h2>Light mode (predicted)</h2>
          <canvas id="light" width="16" height="16"></canvas>
        </section>
        <section class="preview">
          <h2>Dark mode (predicted)</h2>
          <canvas id="dark" width="16" height="16"></canvas>
        </section>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
