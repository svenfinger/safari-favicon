<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safari Favicon Tester</title>
</head>
<body>
  <h1>Safari Favicon Tester</h1>
  <p>Pick a PNG from your computer. Nothing is uploaded — everything runs in your browser.</p>
  <p><strong>Note:</strong> Safari’s favicon background rules are undocumented. This is an approximation. Validate in Safari when it matters.</p>

  <p>
    <label>
      PNG favicon:
      <input type="file" id="file" accept="image/png">
    </label>
  </p>

  <div id="output" hidden>
    <h2>Checklist</h2>
    <ul id="checklist"></ul>

    <h2>Light mode (predicted)</h2>
    <canvas id="light" width="16" height="16" style="width:96px;height:96px;image-rendering:pixelated;"></canvas>

    <h2>Dark mode (predicted)</h2>
    <canvas id="dark" width="16" height="16" style="width:96px;height:96px;image-rendering:pixelated;"></canvas>
  </div>

  <script>
    const FAVICON_SIZE = 16;
    const ALPHA_OPAQUE = 250;
    const ALPHA_VISIBLE = 16;
    const MIN_VISIBLE_PIXELS = 4;
    const CONTRAST_THRESHOLD = 2.5;

    const TAB_LIGHT = '#E8E8E8';
    const TAB_DARK = '#282828';
    const ACCENT_LIGHT_MODE = '#000000';
    const ACCENT_DARK_MODE = '#FFFFFF';
    const EDGE_OPAQUE_RATIO = 0.75;

    const fileInput = document.getElementById('file');
    const output = document.getElementById('output');
    const checklistEl = document.getElementById('checklist');
    const lightCanvas = document.getElementById('light');
    const darkCanvas = document.getElementById('dark');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;

      if (file.type !== 'image/png') {
        alert('Please choose a PNG file.');
        fileInput.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => runAnalysis(img, file.name);
        img.onerror = () => alert('Could not decode this PNG.');
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    function runAnalysis(img, fileName) {
      const source = document.createElement('canvas');
      source.width = FAVICON_SIZE;
      source.height = FAVICON_SIZE;
      const ctx = source.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, FAVICON_SIZE, FAVICON_SIZE);
      ctx.drawImage(img, 0, 0, FAVICON_SIZE, FAVICON_SIZE);
      const imageData = ctx.getImageData(0, 0, FAVICON_SIZE, FAVICON_SIZE);

      const analysis = analyze(imageData);
      const lightMode = predictMode(analysis, 'light');
      const darkMode = predictMode(analysis, 'dark');

      renderPredicted(lightCanvas, imageData, TAB_LIGHT, lightMode);
      renderPredicted(darkCanvas, imageData, TAB_DARK, darkMode);

      renderChecklist(fileName, analysis, lightMode, darkMode);
      output.hidden = false;
    }

    function analyze(imageData) {
      const { data, width, height } = imageData;
      let transparentPixels = 0;
      let visiblePixels = 0;
      let luminanceSum = 0;

      for (let i = 0; i < data.length; i += 4) {
        const a = data[i + 3];
        if (a < ALPHA_OPAQUE) transparentPixels++;
        if (a >= ALPHA_VISIBLE) {
          visiblePixels++;
          luminanceSum += relativeLuminance(data[i], data[i + 1], data[i + 2]);
        }
      }

      const totalPixels = width * height;
      const avgLuminance = visiblePixels > 0 ? luminanceSum / visiblePixels : 0;
      const transparentBackground = hasTransparentBackground(data, width, height);
      const edgeStats = sampleEdgePixels(data, width, height);

      return {
        hasTransparency: transparentPixels > 0,
        transparentRatio: transparentPixels / totalPixels,
        transparentBackground,
        fullBleed: edgeStats.opaqueRatio >= EDGE_OPAQUE_RATIO && !transparentBackground,
        edgeLuminance: edgeStats.luminance,
        edgeOpaqueRatio: edgeStats.opaqueRatio,
        visiblePixels,
        avgLuminance,
        hasVisibleContent: visiblePixels >= MIN_VISIBLE_PIXELS,
      };
    }

    function sampleEdgePixels(data, width, height) {
      const edgeCoords = [];
      for (let x = 0; x < width; x++) {
        edgeCoords.push([x, 0], [x, height - 1]);
      }
      for (let y = 1; y < height - 1; y++) {
        edgeCoords.push([0, y], [width - 1, y]);
      }

      let opaqueEdge = 0;
      let luminanceSum = 0;
      for (const [x, y] of edgeCoords) {
        const i = (y * width + x) * 4;
        const a = data[i + 3];
        if (a >= ALPHA_VISIBLE) {
          opaqueEdge++;
          luminanceSum += relativeLuminance(data[i], data[i + 1], data[i + 2]);
        }
      }

      return {
        opaqueRatio: opaqueEdge / edgeCoords.length,
        luminance: opaqueEdge > 0 ? luminanceSum / opaqueEdge : 0,
      };
    }

    function hasTransparentBackground(data, width, height) {
      const edgeCoords = [];
      for (let x = 0; x < width; x++) {
        edgeCoords.push([x, 0], [x, height - 1]);
      }
      for (let y = 1; y < height - 1; y++) {
        edgeCoords.push([0, y], [width - 1, y]);
      }

      let transparentEdge = 0;
      for (const [x, y] of edgeCoords) {
        const i = (y * width + x) * 4;
        if (data[i + 3] < ALPHA_OPAQUE) transparentEdge++;
      }

      return transparentEdge / edgeCoords.length >= 0.6;
    }

    function predictMode(analysis, mode) {
      const { avgLuminance, edgeLuminance, fullBleed, hasVisibleContent } = analysis;
      const tabBg = mode === 'light' ? TAB_LIGHT : TAB_DARK;
      const accentColor = mode === 'light' ? ACCENT_LIGHT_MODE : ACCENT_DARK_MODE;

      if (!hasVisibleContent) {
        return {
          treatment: 'none',
          contrastRatio: 0,
          tabBg,
          accentColor: null,
          reason: 'No visible icon content',
        };
      }

      const tabLum = relativeLuminanceFromHex(tabBg);
      const sampleLum = fullBleed ? edgeLuminance : avgLuminance;
      const contrastRatio = contrastRatioBetween(sampleLum, tabLum);
      const needsAccent = contrastRatio < CONTRAST_THRESHOLD;
      const treatment = needsAccent ? (fullBleed ? 'border' : 'plate') : 'none';

      let reason;
      if (!needsAccent) {
        reason = `Estimated contrast ${contrastRatio.toFixed(2)}:1 looks sufficient`;
      } else if (fullBleed) {
        reason = `Full-bleed edge contrast ${contrastRatio.toFixed(2)}:1 is below ~${CONTRAST_THRESHOLD}:1`;
      } else {
        reason = `Glyph contrast ${contrastRatio.toFixed(2)}:1 is below ~${CONTRAST_THRESHOLD}:1`;
      }

      return {
        treatment,
        contrastRatio,
        tabBg,
        accentColor: needsAccent ? accentColor : null,
        reason,
        fullBleed,
      };
    }

    function renderPredicted(canvas, imageData, tabBg, mode) {
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = tabBg;
      ctx.fillRect(0, 0, FAVICON_SIZE, FAVICON_SIZE);

      if (mode.treatment === 'plate' && mode.accentColor) {
        drawPlate(ctx, mode.accentColor);
      }

      const iconCanvas = document.createElement('canvas');
      iconCanvas.width = FAVICON_SIZE;
      iconCanvas.height = FAVICON_SIZE;
      iconCanvas.getContext('2d').putImageData(imageData, 0, 0);
      ctx.drawImage(iconCanvas, 0, 0);

      if (mode.treatment === 'border' && mode.accentColor) {
        drawBorder(ctx, mode.accentColor);
      }
    }

    function drawPlate(ctx, color) {
      ctx.fillStyle = color;
      const pad = 1;
      const size = FAVICON_SIZE - pad * 2;
      const radius = 3;
      ctx.beginPath();
      roundedRect(ctx, pad, pad, size, size, radius);
      ctx.fill();
    }

    function drawBorder(ctx, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      const inset = 0.5;
      const size = FAVICON_SIZE - 1;
      const radius = 3;
      ctx.beginPath();
      roundedRect(ctx, inset, inset, size, size, radius);
      ctx.stroke();
    }

    function roundedRect(ctx, x, y, w, h, r) {
      if (ctx.roundRect) {
        ctx.roundRect(x, y, w, h, r);
      } else {
        roundedRectPath(ctx, x, y, w, h, r);
      }
    }

    function roundedRectPath(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function renderChecklist(fileName, analysis, lightMode, darkMode) {
      checklistEl.innerHTML = '';

      addCheck('pass', `PNG loaded: ${fileName}`);
      addCheck('pass', `Scaled to ${FAVICON_SIZE}×${FAVICON_SIZE} (Safari tab size)`);

      if (analysis.hasTransparency) {
        addCheck('pass', `Transparency detected (${Math.round(analysis.transparentRatio * 100)}% of pixels not fully opaque)`);
      } else {
        addCheck('info', 'No transparency detected — fully opaque PNG');
      }

      if (analysis.transparentBackground) {
        addCheck('pass', 'Transparent background (edges mostly transparent) — low contrast may add an inner plate behind the glyph');
      } else if (analysis.fullBleed) {
        addCheck('warn', `Full-bleed icon (${Math.round(analysis.edgeOpaqueRatio * 100)}% opaque edges) — low edge contrast may add an outer border that traces the square`);
      } else {
        addCheck('warn', 'Mixed/opaque edges — not clearly transparent or full-bleed');
      }

      if (analysis.hasVisibleContent) {
        addCheck('pass', `Visible icon content (${analysis.visiblePixels} pixels)`);
        addCheck('info', `Average glyph luminance: ${(analysis.avgLuminance * 100).toFixed(0)}%`);
        if (analysis.fullBleed) {
          addCheck('info', `Edge/background luminance: ${(analysis.edgeLuminance * 100).toFixed(0)}% (used for full-bleed contrast)`);
        }
      } else {
        addCheck('fail', 'Not enough visible content — icon may appear empty');
      }

      addModeCheck('Light mode', lightMode);
      addModeCheck('Dark mode', darkMode);

      addCheck('info', 'Compare these previews with Safari tabs using the same PNG. Rules here are guessed.');
    }

    function addModeCheck(label, mode) {
      if (mode.treatment === 'none') {
        addCheck('pass', `${label}: ${mode.reason} — no Safari accent predicted`);
        return;
      }

      const accent = mode.accentColor === '#000000' ? 'black' : 'white';
      if (mode.treatment === 'border') {
        addCheck('warn', `${label}: ${mode.reason} — ${accent} outer border predicted (full-bleed)`);
      } else {
        addCheck('warn', `${label}: ${mode.reason} — ${accent} inner plate predicted (transparent background)`);
      }
    }

    function addCheck(level, text) {
      const li = document.createElement('li');
      li.textContent = `[${level.toUpperCase()}] ${text}`;
      checklistEl.appendChild(li);
    }

    function srgbToLinear(channel) {
      const c = channel / 255;
      return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
    }

    function relativeLuminance(r, g, b) {
      const R = srgbToLinear(r);
      const G = srgbToLinear(g);
      const B = srgbToLinear(b);
      return 0.2126 * R + 0.7152 * G + 0.0722 * B;
    }

    function relativeLuminanceFromHex(hex) {
      const n = parseInt(hex.slice(1), 16);
      return relativeLuminance((n >> 16) & 255, (n >> 8) & 255, n & 255);
    }

    function contrastRatioBetween(l1, l2) {
      const lighter = Math.max(l1, l2);
      const darker = Math.min(l1, l2);
      return (lighter + 0.05) / (darker + 0.05);
    }
  </script>
</body>
</html>
